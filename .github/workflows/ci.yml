name: mfusg CI/CD
on:
  # run at 6 AM UTC every day
  schedule:
    - cron: '0 6 * * *'
  push:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  PIXI_BETA_WARNING_OFF: true
  PROJ_NAME: mfusg
  LONG_NAME: MODFLOW USG
jobs:
  build:
    name: ${{ matrix.os }} ${{ matrix.compiler }} ${{ matrix.version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # test latest gcc
          - {os: ubuntu-latest, compiler: gcc, version: 13, shell: bash, release: no}
          - {os: macos-14, compiler: gcc, version: 13, shell: bash, release: yes}
          - {os: macos-15-intel, compiler: gcc, version: 13, shell: bash, release: yes}
          - {os: windows-latest, compiler: gcc, version: 13, shell: pwsh, release: no}
          # test intel-classic
          - {os: ubuntu-22.04, compiler: intel-classic, version: 2021.7, shell: bash, release: no}
          # test previous gcc
          - {os: ubuntu-latest, compiler: gcc, version: 12, shell: bash, release: no}
          - {os: ubuntu-latest, compiler: gcc, version: 11, shell: bash, release: no}
          # test ifx
          - {os: ubuntu-22.04, compiler: intel, version: "2025.0", shell: bash, release: yes}
          - {os: windows-2022, compiler: intel, version: "2025.0", shell: pwsh, release: yes}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout ${{ env.PROJ_NAME }}
        uses: actions/checkout@v5
        with:
          path: ${{ env.PROJ_NAME }}

      - name: Setup ${{ matrix.compiler }} ${{ matrix.version }}
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: ${{ matrix.compiler}}
          version: ${{ matrix.version }}

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.2
        with:
          pixi-version: v0.41.4
          manifest-path: "${{ env.PROJ_NAME }}/pixi.toml"

      - name: Get ostag
        shell: bash
        working-directory: ${{ env.PROJ_NAME }}
        id: ostag
        run: |
          echo "ostag=$(pixi run get-ostag)" >> $GITHUB_OUTPUT

      # static link gfortran libs
      - name: Hide dylibs (macOS)
        if: runner.os == 'macOS'
        working-directory: ${{ env.PROJ_NAME }}
        run: |
          version="${{ matrix.version }}"
          brew_prefix="$(brew --prefix)"
          libpath="$brew_prefix/opt/gcc@$version/lib/gcc/$version"
          mv $libpath/libgcc_s.1.1.dylib $libpath/libgcc_s.1.1.dylib.bak
          mv $libpath/libgfortran.5.dylib $libpath/libgfortran.5.dylib.bak
          mv $libpath/libquadmath.0.dylib $libpath/libquadmath.0.dylib.bak
          mv $libpath/libstdc++.6.dylib $libpath/libstdc++.6.dylib.bak

      # static link libgcc
      - name: Set LDFLAGS (macOS)
        if: runner.os == 'macOS'
        run: |
          ldflags="$LDFLAGS -static-libgcc"
          echo "LDFLAGS=$ldflags" >> $GITHUB_ENV

      - name: Build single precision
        working-directory: ${{ env.PROJ_NAME }}
        run: |
          pixi run setup builddir
          pixi run build builddir

      - name: Build double precision
        working-directory: ${{ env.PROJ_NAME }}
        run: |
          pixi run setup builddir-dble -Ddouble=true
          pixi run build builddir-dble

      - name: Check arch/deps (macOS)
        working-directory: ${{ env.PROJ_NAME }}/bin
        if: runner.os == 'macOS'
        run: |
          otool -L mfusg
          otool -L mfusgdbl
          lipo -info mfusg
          lipo -info mfusgdbl

      - name: Show build log
        if: failure()
        working-directory: ${{ env.PROJ_NAME }}
        run: cat builddir/meson-logs/meson-log.txt

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.compiler}}-${{ matrix.version }}-meson-log.txt
          path: ${{ env.PROJ_NAME }}/builddir/meson-logs/meson-log.txt

      - name: Create source archive
        if: ${{ matrix.release == 'yes' && runner.os == 'Linux' }}
        working-directory: ${{ env.PROJ_NAME }}
        run: |
          zip -r ${{ env.PROJ_NAME }}_source.zip meson.build src/
          ls -lha *.zip

      - name: Create distribution archive (Linux, macOS)
        if: ${{ matrix.release == 'yes' && runner.os != 'Windows' }}
        working-directory: ${{ env.PROJ_NAME }}
        run: |
          zip -r -j ${{ steps.ostag.outputs.ostag }}.zip bin/
          ls -lha *.zip

      - name: Create distribution archive (Windows)
        if: ${{ matrix.release == 'yes' && runner.os == 'Windows' }}
        working-directory: ${{ env.PROJ_NAME }}
        run: |
          $ZipFileName = "${{ steps.ostag.outputs.ostag }}.zip"
          Compress-Archive -Path "bin\*" -DestinationPath $ZipFileName
          ls *.zip

      - name: Upload distribution archive
        if: matrix.release == 'yes'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJ_NAME }}_${{ matrix.os }}
          path: ${{ env.PROJ_NAME }}/*.zip

  release:
    name: Make release
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          path: ${{ env.PROJ_NAME }}

      - name: Get version
        working-directory: ${{ env.PROJ_NAME }}
        id: version
        run: |
          ver=$(grep "^  version:" meson.build | head -1 | sed "s/  version: '\(.*\)',/\1/g")
          echo "version=$ver" >> $GITHUB_OUTPUT

      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.PROJ_NAME }}*
          merge-multiple: true
          path: ${{ env.PROJ_NAME }}

      - name: List distribution files
        run: ls -l ${{ env.PROJ_NAME }}

        # create new release if manual trigger
      - name: Create release
        if: github.event_name == 'workflow_dispatch'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: ${{ env.PROJ_NAME }} ${{ steps.version.outputs.version }}
          body: ${{ env.LONG_NAME }} version ${{ steps.version.outputs.version }}
          artifacts: "${{ env.PROJ_NAME }}/*"
          draft: false
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
